<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Dashboard | HealthSync</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="../css/main.css">
    <style>
        body {
            background-color: var(--background);
            color: var(--text);
        }
        .dashboard-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
        }
        .sidebar {
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            padding: 32px 24px;
        }
        .main-content {
            padding: 40px;
            background: radial-gradient(circle at top right, rgba(14, 165, 233, 0.05), transparent);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            padding: 24px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            transition: transform 0.2s;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
        }
        .stat-card h4 {
            color: var(--text-light);
            font-size: 0.9rem;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .stat-card .value {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .queue-container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 32px;
            border: 1px solid var(--glass-border);
        }
        .queue-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 24px;
        }
        .queue-table th {
            text-align: left;
            padding: 16px;
            color: var(--text-light);
            font-size: 0.85rem;
            text-transform: uppercase;
            border-bottom: 1px solid var(--glass-border);
        }
        .queue-table td {
            padding: 20px 16px;
            border-bottom: 1px solid var(--glass-border);
        }
        .status-pill {
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .status-waiting { background: rgba(245, 158, 11, 0.1); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.2); }
        .status-active { background: rgba(14, 165, 233, 0.1); color: #38bdf8; border: 1px solid rgba(14, 165, 233, 0.2); }
        .status-completed { background: rgba(34, 197, 94, 0.1); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.2); }
        
        .btn-call {
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-call:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
        }
    </style>
</head>
<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <h2 class="mb-4" style="color: var(--primary); display: flex; align-items: center; gap: 12px;">
                <i data-lucide="shield-check"></i> HealthSync
            </h2>
            <nav style="margin-top: 40px;">
                <a href="#" style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: rgba(14, 165, 233, 0.1); color: var(--primary); border-radius: 12px; text-decoration: none; font-weight: 600; margin-bottom: 8px;">
                    <i data-lucide="layout-dashboard" size="20"></i> Dashboard
                </a>
                <a href="#" style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: var(--text-light); text-decoration: none; border-radius: 12px;">
                    <i data-lucide="users" size="20"></i> Patients
                </a>
                <a href="../index.html" style="display: flex; align-items: center; gap: 12px; padding: 12px 16px; color: var(--text-light); text-decoration: none; border-radius: 12px; margin-top: auto;">
                    <i data-lucide="log-out" size="20"></i> Logout
                </a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="mb-4" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 48px;">
                <div>
                    <h1 style="font-size: 2.5rem; margin-bottom: 8px;">Doctor Dashboard</h1>
                    <p style="color: var(--text-light);">Manage your patient queue for today</p>
                </div>
                <div id="doctorProfile" style="text-align: right;">
                    <strong style="font-size: 1.2rem;">Dr. Vikram</strong>
                    <p style="color: var(--primary); font-weight: 600;">Room 101</p>
                </div>
            </header>

            <div class="stats-grid">
                <div class="stat-card">
                    <h4>Total Tokens</h4>
                    <div class="value" id="totalTokens">0</div>
                </div>
                <div class="stat-card">
                    <h4>Waiting</h4>
                    <div class="value" id="waitingTokens" style="color: #fbbf24; -webkit-text-fill-color: #fbbf24;">0</div>
                </div>
                <div class="stat-card">
                    <h4>Served</h4>
                    <div class="value" id="servedTokens" style="color: #4ade80; -webkit-text-fill-color: #4ade80;">0</div>
                </div>
            </div>

            <div class="queue-container">
                <h3 style="font-size: 1.5rem;">Current Queue</h3>
                <table class="queue-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Patient Name</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="queueBody">
                        <!-- Tokens will be loaded here -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="../js/services/supabase.js"></script>
    <script>
        lucide.createIcons();
        
        const doctorId = 'current-doctor-id'; // Get from session

        async function loadQueue() {
            const { data: tokens, error } = await window.supabaseClient
                .from('tokens')
                .select('*')
                .eq('doctor_id', doctorId)
                .order('num', { ascending: true });

            if (error) return console.error(error);

            const tbody = document.getElementById('queueBody');
            tbody.innerHTML = '';
            
            let waitingCount = 0;
            let servedCount = 0;

            tokens.forEach(token => {
                if (token.status === 'waiting') waitingCount++;
                if (token.status === 'completed') servedCount++;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong style="font-size: 1.1rem; color: var(--primary);">#${token.num}</strong></td>
                    <td><span style="font-weight: 500;">${token.patient_name}</span></td>
                    <td><span class="status-pill status-${token.status}">${token.status}</span></td>
                    <td>
                        ${token.status === 'waiting' ? `<button class="btn-call" onclick="callPatient(${token.id})">Call Next</button>` : '-'}
                    </td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('totalTokens').textContent = tokens.length;
            document.getElementById('waitingTokens').textContent = waitingCount;
            document.getElementById('servedTokens').textContent = servedCount;
        }

        async function callPatient(tokenId) {
            try {
                const { error } = await window.supabaseClient
                    .from('tokens')
                    .update({ status: 'active' })
                    .eq('id', tokenId);
                
                if (error) throw error;
                
                alert('Patient called! Notification sent via WhatsApp.');
                loadQueue();
            } catch (err) {
                alert(err.message);
            }
        }

        loadQueue();
        window.supabaseClient
            .channel('tokens')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'tokens' }, loadQueue)
            .subscribe();
    </script>
</body>
</html>
