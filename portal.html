<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Portal | HealthSync Access</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    
    <!-- Styles -->
    <link rel="stylesheet" href="css/main.css">
    <style>
        .portal-header {
            padding-top: 140px;
            text-align: center;
            margin-bottom: 60px;
        }

        .portal-header h1 {
            font-size: 3.5rem;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        .doctor-selection {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
            padding-bottom: 100px;
        }

        .doctor-card-elite {
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 32px;
            display: flex;
            align-items: center;
            gap: 24px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .doctor-card-elite:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            background: rgba(15, 23, 42, 0.6);
        }

        .doc-avatar-wrap {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.2), rgba(34, 211, 238, 0.1));
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(14, 165, 233, 0.2);
        }

        .doc-details h3 {
            font-size: 1.4rem;
            margin-bottom: 4px;
            color: #fff;
        }

        .doc-details p {
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .status-pill-elite {
            margin-left: auto;
            padding: 6px 14px;
            background: rgba(34, 197, 94, 0.1);
            color: #4ade80;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border: 1px solid rgba(34, 197, 94, 0.2);
        }

        /* Modal Overhaul */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(2, 6, 23, 0.9);
            backdrop-filter: blur(10px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            padding: 24px;
        }

        .modal-elite {
            background: #0f172a;
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 48px;
            width: 100%;
            max-width: 480px;
            text-align: center;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.8);
        }

        .modal-elite i.ticket-icon {
            width: 80px;
            height: 80px;
            color: var(--primary);
            margin-bottom: 32px;
            background: rgba(14, 165, 233, 0.1);
            padding: 20px;
            border-radius: 24px;
        }

        .form-elite {
            margin-top: 40px;
            text-align: left;
        }

        .form-elite label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-elite input {
            width: 100%;
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px 20px;
            color: #fff;
            font-family: inherit;
            margin-bottom: 24px;
            transition: all 0.2s;
        }

        .form-elite input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(30, 41, 59, 0.8);
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.1);
        }

        .btn-elite {
            background: #fff;
            color: #000;
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .btn-elite:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div class="bg-scene">
        <div class="bg-blur-blob bg-blob-1"></div>
        <div class="bg-blur-blob bg-blob-2"></div>
    </div>

    <nav class="navbar scrolled">
        <div class="container nav-content">
            <a href="index.html" class="logo">
                <i data-lucide="shield-check"></i> HealthSync
            </a>
            <div class="nav-actions">
                <span style="color: var(--text-muted); font-size: 0.9rem; font-weight: 600;">Access Portal</span>
            </div>
        </div>
    </nav>

    <main class="container">
        <header class="portal-header fade-up">
            <h1 id="hospitalName">Loading Facility...</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem;">Secure Digital Token Issuance System</p>
        </header>

        <div id="doctorList" class="doctor-selection fade-up" style="animation-delay: 0.2s;">
            <!-- Doctors will be loaded here -->
        </div>
    </main>

    <div id="tokenModal" class="modal-overlay">
        <div class="modal-elite fade-up">
            <i data-lucide="ticket" class="ticket-icon"></i>
            <h2 style="font-size: 2rem; color: #fff; margin-bottom: 8px;">Request Token</h2>
            <p style="color: var(--text-muted);">Enter your identification details below</p>
            
            <div class="form-elite">
                <label>Full Legal Name</label>
                <input type="text" id="patientName" placeholder="e.g. Alexander Pierce">
                
                <label>Mobile Number (WhatsApp)</label>
                <input type="tel" id="patientPhone" placeholder="+91 00000 00000">
                
                <button class="btn-elite" id="generateTokenBtn">Authorize & Generate Token</button>
                <button style="background: none; border: none; color: var(--text-muted); width: 100%; margin-top: 20px; cursor: pointer; font-weight: 600;" onclick="closeModal()">Dismiss</button>
            </div>
        </div>
    </div>

    <script src="js/services/supabase.js"></script>
    <script>
        lucide.createIcons();
        
        let selectedDoctorId = null;

        async function loadDoctors() {
            const { data: doctors, error } = await window.supabaseClient
                .from('profiles')
                .select('*')
                .eq('role', 'doctor');
            
            const list = document.getElementById('doctorList');
            list.innerHTML = '';
            
            doctors.forEach((doc, index) => {
                const card = document.createElement('div');
                card.className = 'doctor-card-elite';
                card.style.animationDelay = `${0.3 + (index * 0.1)}s`;
                card.onclick = () => openModal(doc.id);
                card.innerHTML = `
                    <div class="doc-avatar-wrap"><i data-lucide="user"></i></div>
                    <div class="doc-details">
                        <h3>${doc.full_name}</h3>
                        <p>${doc.specialization || 'Clinical Specialist'}</p>
                        <p style="font-size: 0.8rem; margin-top: 4px;">Department Unit ${doc.room_number || 'A1'}</p>
                    </div>
                    <div class="status-pill-elite">Live</div>
                `;
                list.appendChild(card);
            });
            lucide.createIcons();
        }

        function openModal(docId) {
            selectedDoctorId = docId;
            document.getElementById('tokenModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('tokenModal').style.display = 'none';
        }

        // Token generation logic (keeping existing Supabase logic)
        document.getElementById('generateTokenBtn').addEventListener('click', async () => {
            const name = document.getElementById('patientName').value;
            const phone = document.getElementById('patientPhone').value;
            
            if (!name || !phone) return alert('Please provide identification details.');

            try {
                const { data: lastToken } = await window.supabaseClient
                    .from('tokens')
                    .select('num')
                    .eq('doctor_id', selectedDoctorId)
                    .order('num', { ascending: false })
                    .limit(1)
                    .maybeSingle();
                
                const nextNum = (lastToken?.num || 0) + 1;

                const { data, error } = await window.supabaseClient
                    .from('tokens')
                    .insert({
                        doctor_id: selectedDoctorId,
                        patient_name: name,
                        patient_phone: phone,
                        num: nextNum,
                        status: 'waiting'
                    })
                    .select()
                    .single();

                if (error) throw error;
                
                alert(`Token Verified! Sequence ID: ${nextNum}`);
                closeModal();
            } catch (error) {
                alert(error.message);
            }
        });

        loadDoctors();
    </script>
</body>
</html>
